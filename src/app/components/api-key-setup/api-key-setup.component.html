<div class="setup-container">
  <h1>AI Translation Practice</h1>
  <p class="subtitle">Ứng dụng luyện dịch tiếng Anh sang tiếng Việt</p>

  <form (ngSubmit)="onSubmit()" class="setup-form">
    <div class="form-group">
      <label for="geminiKey">Gemini API Key</label>
      <input
        type="password"
        id="geminiKey"
        [(ngModel)]="geminiKey"
        name="geminiKey"
        placeholder="AIza..."
        autocomplete="off"
      >
      @if (geminiError) {
        <span class="error">{{ geminiError }}</span>
      }
      <span class="hint">Lấy API key từ <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a></span>
    </div>

    <div class="form-group">
      <label for="githubToken">GitHub Personal Access Token</label>
      <input
        type="password"
        id="githubToken"
        [(ngModel)]="githubToken"
        name="githubToken"
        placeholder="ghp_..."
        autocomplete="off"
      >
      @if (githubError) {
        <span class="error">{{ githubError }}</span>
      }
      <span class="hint">Cần scope <code>repo</code>. Lấy token tại <a href="https://github.com/settings/tokens" target="_blank">GitHub Settings</a></span>
    </div>

    <button type="submit" class="submit-btn">Bắt đầu luyện dịch</button>
  </form>
</div>
